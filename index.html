<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#f8f5f0" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#16130e" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>时光胶囊</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ====== Background ====== -->
  <div class="bg-texture">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
  </div>

  <!-- ====== App Container ====== -->
  <div class="app-container">

    <!-- ====== Header ====== -->
    <header class="header">
      <div class="header-totoro"><svg viewBox="0 0 100 100" width="56" height="56">
        <!-- Ears -->
        <ellipse cx="28" cy="24" rx="7" ry="12" fill="#7d7d7d" transform="rotate(-15,28,24)"/>
        <ellipse cx="72" cy="24" rx="7" ry="12" fill="#7d7d7d" transform="rotate(15,72,24)"/>
        <!-- Body -->
        <ellipse cx="50" cy="60" rx="32" ry="30" fill="#7d7d7d"/>
        <!-- Belly -->
        <ellipse cx="50" cy="66" rx="22" ry="20" fill="#c8c0b0"/>
        <!-- Belly V pattern -->
        <path d="M37 77 L50 58 L63 77" fill="none" stroke="#b3aa99" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Eyes -->
        <ellipse class="totoro-eye" cx="36" cy="47" rx="7.5" ry="9" fill="#222"/>
        <ellipse class="totoro-eye" cx="64" cy="47" rx="7.5" ry="9" fill="#222"/>
        <circle class="totoro-pupil" cx="39" cy="44" r="4" fill="#fff"/>
        <circle class="totoro-pupil" cx="61" cy="44" r="4" fill="#fff"/>
        <!-- Nose -->
        <ellipse cx="50" cy="56" rx="3.5" ry="2.5" fill="#444"/>
        <!-- Grin -->
        <path d="M43 63 Q50 69 57 63" fill="none" stroke="#555" stroke-width="2" stroke-linecap="round"/>
        <!-- Whiskers -->
        <line x1="16" y1="53" x2="34" y2="55" stroke="#6a6a6a" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="16" y1="59" x2="34" y2="60" stroke="#6a6a6a" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="16" y1="65" x2="34" y2="65" stroke="#6a6a6a" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="84" y1="53" x2="66" y2="55" stroke="#6a6a6a" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="84" y1="59" x2="66" y2="60" stroke="#6a6a6a" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="84" y1="65" x2="66" y2="65" stroke="#6a6a6a" stroke-width="1.5" stroke-linecap="round"/>
        <!-- Feet -->
        <ellipse cx="36" cy="87" rx="9" ry="5" fill="#7d7d7d"/>
        <ellipse cx="64" cy="87" rx="9" ry="5" fill="#7d7d7d"/>
      </svg></div>
      <h1 class="header-title">时光<span class="header-title-accent">胶囊</span></h1>
      <p class="header-sub">— 封存每一个值得珍藏的瞬间 —</p>
      <div class="header-rule">
        <span class="header-rule-line"></span>
        <span class="header-rule-dot"></span>
        <span class="header-rule-line"></span>
      </div>
      <button class="theme-toggle" id="theme-toggle" aria-label="切换主题">
        <svg class="theme-icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="4.5"/><line x1="12" y1="2" x2="12" y2="4.5"/>
          <line x1="12" y1="19.5" x2="12" y2="22"/><line x1="2" y1="12" x2="4.5" y2="12"/>
          <line x1="19.5" y1="12" x2="22" y2="12"/><line x1="4.93" y1="4.93" x2="6.7" y2="6.7"/>
          <line x1="17.3" y1="17.3" x2="19.07" y2="19.07"/><line x1="4.93" y1="19.07" x2="6.7" y2="17.3"/>
          <line x1="17.3" y1="6.7" x2="19.07" y2="4.93"/>
        </svg>
        <svg class="theme-icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M21 12.79A9 9 0 0 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </header>

    <!-- ====== Tab Bar ====== -->
    <nav class="tab-bar">
      <button class="tab-btn active" data-tab="passed">
        <span>已经</span>
        <span class="tab-count" id="passed-count">0</span>
      </button>
      <button class="tab-btn" data-tab="upcoming">
        <span>还有</span>
        <span class="tab-count" id="upcoming-count">0</span>
      </button>
    </nav>

    <!-- ====== Toolbar ====== -->
    <div class="toolbar" id="toolbar">
      <div class="toolbar-search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <circle cx="10.5" cy="10.5" r="6"/><line x1="15.5" y1="15.5" x2="21" y2="21"/>
        </svg>
        <input type="text" class="toolbar-search" id="search-input" placeholder="搜索名称..." autocomplete="off">
      </div>
      <button class="toolbar-btn" id="btn-export" title="导出数据">
        <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
      </button>
      <button class="toolbar-btn" id="btn-import" title="导入数据">
        <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </button>
    </div>

    <!-- ====== Passed Section ====== -->
    <section class="section active" id="section-passed">
      <div class="card-list" id="passed-list"></div>
      <div class="empty-state" id="empty-passed">
        <div class="empty-state-icon">🕰️</div>
        <p class="empty-state-title">还没有已过的记录</p>
        <p class="empty-state-hint">点击右下角 + 添加重要日子</p>
      </div>
    </section>

    <!-- ====== Upcoming Section ====== -->
    <section class="section" id="section-upcoming">
      <div class="card-list" id="upcoming-list"></div>
      <div class="empty-state" id="empty-upcoming">
        <div class="empty-state-icon">🎋</div>
        <p class="empty-state-title">还没有待来的记录</p>
        <p class="empty-state-hint">点击右下角 + 添加期待的日子</p>
      </div>
    </section>

    <!-- ====== Feedback Section ====== -->
    <section class="feedback-section" id="feedback-section">
      <div class="feedback-divider"></div>
      <div class="feedback-header">
        <span class="feedback-emoji">💡</span>
        <span class="feedback-title">优化建议箱</span>
      </div>
      <p class="feedback-desc">你的每一个建议，都让这个应用变得更好</p>
      <div class="feedback-form">
        <select id="feedback-category" class="feedback-select">
          <option value="功能建议">💡 功能建议</option>
          <option value="Bug反馈">🐛 问题反馈</option>
          <option value="其他">📌 其他</option>
        </select>
        <input type="text" id="feedback-contact" class="feedback-input" placeholder="联系方式（选填，邮箱等）" autocomplete="off">
        <textarea id="feedback-content" class="feedback-textarea" placeholder="详细描述你的建议或遇到的问题..." rows="3"></textarea>
        <button class="feedback-btn" id="feedback-submit">提交反馈</button>
        <p class="feedback-status" id="feedback-status"></p>
      </div>
    </section>

  </div>

  <!-- ====== FAB ====== -->
  <div class="fab-wrap">
    <button class="fab" id="fab" aria-label="添加">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <line x1="12" y1="4" x2="12" y2="20" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
        <line x1="4" y1="12" x2="20" y2="12" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <!-- ====== Confirm Dialog ====== -->
  <div class="confirm-overlay" id="confirm-overlay">
    <div class="confirm-dialog">
      <p class="confirm-msg" id="confirm-msg"></p>
      <div class="confirm-actions">
        <button class="confirm-btn confirm-cancel" id="confirm-cancel">取消</button>
        <button class="confirm-btn confirm-ok" id="confirm-ok">确定</button>
      </div>
    </div>
  </div>

  <!-- ====== Celebration ====== -->
  <div class="celebration" id="celebration">
    <div class="celebration-body">
      <span class="celebration-emoji">🎉</span>
      <span class="celebration-text" id="celebration-text"></span>
    </div>
  </div>

  <!-- ====== Modal Overlay ====== -->
  <div class="modal-overlay" id="modal-overlay"></div>

  <!-- ====== Add Form (Bottom Sheet) ====== -->
  <div class="add-form" id="add-form">
    <div class="add-form-handle">
      <span class="add-form-handle-bar"></span>
    </div>
    <h2 class="add-form-title" id="form-title">记录新日子</h2>
    <form id="add-form-inner">
      <div class="form-group">
        <label for="event-name">名称</label>
        <input type="text" id="event-name" placeholder="例：恋爱纪念日" required>
      </div>

      <div class="form-row">
        <div class="form-group form-half">
          <label>类型</label>
          <div class="radio-group">
            <input type="radio" name="type" id="type-passed" value="passed" checked>
            <label for="type-passed">已过</label>
            <input type="radio" name="type" id="type-upcoming" value="upcoming">
            <label for="type-upcoming">待来</label>
          </div>
        </div>
        <div class="form-group form-half">
          <label for="event-category">分类</label>
          <div class="select-wrap">
            <select id="event-category">
              <option value="love">❤️ 爱情</option>
              <option value="friendship">🤝 友情</option>
              <option value="family">👨‍👩‍👧 亲情</option>
              <option value="birthday">🎂 生日</option>
              <option value="anniversary">💍 纪念日</option>
              <option value="self">🌟 自我</option>
              <option value="other">📌 其他</option>
            </select>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="event-date">日期</label>
        <input type="date" id="event-date" required>
      </div>

      <div class="form-group">
        <label class="checkbox-label">
          <input type="checkbox" id="event-repeat" checked>
          <span class="checkbox-custom"></span>
          <span class="checkbox-text">每年重复</span>
        </label>
      </div>

      <div class="form-group">
        <label for="event-note">备注<span style="color:var(--ink-faint);font-weight:400;text-transform:none;letter-spacing:normal;">（可选）</span></label>
        <textarea id="event-note" placeholder="添加备注…" rows="2"></textarea>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-cancel" id="btn-cancel">取消</button>
        <button type="submit" class="btn-submit">保存</button>
      </div>
    </form>
  </div>

  <!-- ====== Toast ====== -->
  <div class="toast" id="toast"></div>

  <script src="js/db.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
